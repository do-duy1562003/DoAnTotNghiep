<!DOCTYPE html>
<html lang="vi">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>NấmSmart — Đăng Nhập</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Be+Vietnam+Pro:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      font-family: 'Be Vietnam Pro', sans-serif;
      background: linear-gradient(135deg, #1a4d2e 0%, #2d7a4a 100%);
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 20px;
    }

    .login-container {
      background: white;
      border-radius: 16px;
      box-shadow: 0 20px 60px rgba(0, 0, 0, 0.3);
      width: 100%;
      max-width: 420px;
      padding: 40px;
      animation: slideUp 0.5s ease-out;
    }

    @keyframes slideUp {
      from {
        opacity: 0;
        transform: translateY(30px);
      }
      to {
        opacity: 1;
        transform: translateY(0);
      }
    }

    .login-header {
      text-align: center;
      margin-bottom: 40px;
    }

    .school-name {
      font-size: 13px;
      color: #1a4d2e;
      font-weight: 700;
      margin-bottom: 20px;
      letter-spacing: 0.5px;
      text-transform: uppercase;
    }

    .logo-img {
      width: 100px;
      height: 100px;
      margin-bottom: 20px;
      display: inline-block;
      object-fit: contain;
    }

    .logo {
      font-size: 80px;
      margin-bottom: 20px;
      display: inline-block;
    }

    .logo-text {
      font-size: 28px;
      font-weight: 700;
      color: #1a4d2e;
      margin-bottom: 12px;
    }

    .logo-sub {
      font-size: 13px;
      color: #666;
      font-weight: 400;
      line-height: 1.5;
    }

    .form-group {
      margin-bottom: 20px;
    }

    label {
      display: block;
      font-size: 14px;
      font-weight: 600;
      color: #333;
      margin-bottom: 8px;
    }

    input[type="text"],
    input[type="password"] {
      width: 100%;
      padding: 12px 16px;
      border: 2px solid #e0e0e0;
      border-radius: 8px;
      font-size: 14px;
      font-family: 'Be Vietnam Pro', sans-serif;
      transition: all 0.3s ease;
    }

    input[type="text"]:focus,
    input[type="password"]:focus {
      outline: none;
      border-color: #1a4d2e;
      background-color: #f9f9f9;
      box-shadow: 0 0 0 3px rgba(26, 77, 46, 0.1);
    }

    .remember-forgot {
      display: flex;
      justify-content: space-between;
      align-items: center;
      font-size: 13px;
      margin-bottom: 24px;
    }

    .remember-forgot input[type="checkbox"] {
      margin-right: 6px;
      cursor: pointer;
    }

    .remember-forgot label {
      margin: 0;
      font-weight: 400;
      cursor: pointer;
    }

    .remember-forgot a {
      color: #1a4d2e;
      text-decoration: none;
      font-weight: 600;
      transition: color 0.3s;
    }

    .remember-forgot a:hover {
      color: #2d7a4a;
    }

    .login-btn {
      width: 100%;
      padding: 12px;
      background: linear-gradient(135deg, #1a4d2e 0%, #2d7a4a 100%);
      color: white;
      border: none;
      border-radius: 8px;
      font-size: 16px;
      font-weight: 600;
      font-family: 'Be Vietnam Pro', sans-serif;
      cursor: pointer;
      transition: all 0.3s ease;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 8px;
    }

    .login-btn:hover {
      transform: translateY(-2px);
      box-shadow: 0 10px 25px rgba(26, 77, 46, 0.3);
    }

    .login-btn:active {
      transform: translateY(0);
    }

    .login-btn.loading {
      opacity: 0.7;
      cursor: not-allowed;
    }

    .error-message {
      background-color: #fee;
      color: #c33;
      padding: 12px;
      border-radius: 8px;
      margin-bottom: 20px;
      font-size: 13px;
      border-left: 4px solid #c33;
      display: none;
    }

    .error-message.show {
      display: block;
      animation: shake 0.4s ease;
    }

    @keyframes shake {
      0%, 100% { transform: translateX(0); }
      25% { transform: translateX(-10px); }
      75% { transform: translateX(10px); }
    }

    .demo-info {
      background: #f0f8ff;
      border-left: 4px solid #1a4d2e;
      padding: 12px;
      border-radius: 4px;
      font-size: 12px;
      margin-top: 24px;
      color: #666;
    }

    .demo-info strong {
      color: #1a4d2e;
    }

    .spinner {
      display: none;
      width: 16px;
      height: 16px;
      border: 2px solid #ffffff;
      border-top-color: transparent;
      border-radius: 50%;
      animation: spin 0.8s linear infinite;
    }

    .spinner.show {
      display: inline-block;
    }

    @keyframes spin {
      to { transform: rotate(360deg); }
    }

    /* Mobile Responsive */
    @media (max-width: 480px) {
      .login-container {
        padding: 30px 20px;
      }

      .login-header {
        margin-bottom: 30px;
      }

      .logo-text {
        font-size: 24px;
      }

      .logo {
        font-size: 40px;
      }

      .form-group {
        margin-bottom: 16px;
      }

      input[type="text"],
      input[type="password"] {
        padding: 11px 14px;
        font-size: 16px; /* Ngăn zoom trên iOS */
      }
    }
  </style>
</head>
<body>
  <div class="login-container">
    <div class="login-header">
      <div class="school-name">Trường Đại Học Giao Thông Vận Tải</div>
      <img src="/images/logo.png" alt="HCMUTE Logo" class="logo-img">
      <div class="logo-text">NấmSmart</div>
      <div class="logo-sub">Hệ Thống Nhà Trồng Nấm Thông Minh</div>
    </div>

    <div class="error-message" id="errorMsg"></div>

    <form id="loginForm">
      <div class="form-group">
        <label for="username">Tài Khoản</label>
        <input 
          type="text" 
          id="username" 
          placeholder="Nhập tên đăng nhập"
          autocomplete="username"
          required
        >
      </div>

      <div class="form-group">
        <label for="password">Mật Khẩu</label>
        <input 
          type="password" 
          id="password" 
          placeholder="Nhập mật khẩu"
          autocomplete="current-password"
          required
        >
      </div>

      <div class="remember-forgot">
        <label>
          <input type="checkbox" id="remember">
          Ghi nhớ tôi
        </label>
        <a href="#" onclick="alert('Liên hệ quản trị viên để đặt lại mật khẩu'); return false;">Quên mật khẩu?</a>
      </div>

      <button type="submit" class="login-btn">
        <span class="spinner" id="spinner"></span>
        <span id="btnText">Đăng Nhập</span>
      </button>
    </form>


  </div>

  <script>
    // Kiểm tra xem người dùng đã đăng nhập chưa
    if (localStorage.getItem('nasmart_token')) {
      window.location.href = 'index.html';
    }

    // Khôi phục tài khoản đã lưu
    const savedUsername = localStorage.getItem('nasmart_username');
    if (savedUsername) {
      document.getElementById('username').value = savedUsername;
      document.getElementById('remember').checked = true;
      document.getElementById('username').select();
    }

    document.getElementById('loginForm').addEventListener('submit', async (e) => {
      e.preventDefault();

      const username = document.getElementById('username').value.trim();
      const password = document.getElementById('password').value;
      const errorMsg = document.getElementById('errorMsg');
      const btn = e.target.querySelector('button');
      const spinner = document.getElementById('spinner');
      const btnText = document.getElementById('btnText');

      // Reset lỗi
      errorMsg.classList.remove('show');

      // Validate
      if (!username || !password) {
        showError('Vui lòng nhập tài khoản và mật khẩu');
        return;
      }

      // Loading state
      btn.disabled = true;
      spinner.classList.add('show');
      btnText.textContent = 'Đang xử lý...';

      try {
        const response = await fetch('/api/login', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ username, password })
        });

        const data = await response.json();

        if (response.ok) {
          // Lưu token và thông tin user
          localStorage.setItem('nasmart_token', data.token);
          localStorage.setItem('nasmart_user', JSON.stringify(data.user));

          // Lưu tài khoản nếu chọn "Ghi nhớ"
          if (document.getElementById('remember').checked) {
            localStorage.setItem('nasmart_username', username);
          } else {
            localStorage.removeItem('nasmart_username');
          }

          // Chuyển hướng
          window.location.href = 'index.html';
        } else {
          showError(data.message || 'Tài khoản hoặc mật khẩu không chính xác');
        }
      } catch (error) {
        showError('Lỗi kết nối: ' + error.message);
      } finally {
        btn.disabled = false;
        spinner.classList.remove('show');
        btnText.textContent = 'Đăng Nhập';
      }
    });

    function showError(msg) {
      const errorMsg = document.getElementById('errorMsg');
      errorMsg.textContent = msg;
      errorMsg.classList.add('show');
    }
  </script>
</body>
</html>
